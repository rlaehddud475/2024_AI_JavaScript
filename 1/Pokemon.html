<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="Pokemon.js" defer></script>
    <title>포켓몬 맞추기 게임</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f0f0f0;
        padding: 50px;
      }
      img {
        width: 200px; /* 이미지 크기 설정 */
        height: auto;
      }
      .hidden {
        display: none;
      }
      input {
        padding: 10px;
        font-size: 16px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>포켓몬 맞추기 게임</h1>
    <img id="pokemonImage" src="" alt="포켓몬 이미지" />
    <div>
      <input
        type="text"
        id="pokemonInput"
        placeholder="포켓몬 이름을 입력하세요"
      />
      <button id="submitBtn">제출</button>
      <button id="hintBtn">힌트 보기</button>
    </div>
    <div id="result" class="hidden"></div>
    <div id="hint" class="hidden"></div>

    <script src="script.js"></script>
  </body>
</html>
