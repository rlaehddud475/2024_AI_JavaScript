<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지</title>
    <link rel="stylesheet" href="Mypage.css" />
    <script src="MyPage.js" defer></script>
  </head>
  <body>
    <header>
      <div class="header-buttons">
        <a href="#" class="header-button" onclick="viewPokedex()"
          >포켓몬 도감</a
        >
        <a href="#" class="header-button" onclick="playGame()">게임 시작</a>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="page">
          <span>마이페이지</span>
          <button class="out" onclick="deleteAccount()">회원 탈퇴</button>
        </div>
        <div class="profile" id="profileSection">
          <label for="userId">아이디:</label>
          <input type="text" id="userId" value="hong123" /><br />
          <label for="email">이메일:</label>
          <input type="email" id="email" value="hong@example.com" /><br />
          <label for="password">비밀번호:</label>
          <input type="password" id="password" /><br />
          <label for="confirmPassword">비밀번호 확인:</label>
          <input type="password" id="confirmPassword" /><br />
          <div>
            <button onclick="updateProfile()">수정하기</button>
          </div>
          <div>
            <button onclick="viewWinRate()">게임 승률 확인</button>
            <button onclick="viewPokemonCollection()">
              포켓몬 수집 목록 조회
            </button>
          </div>
        </div>

        <div class="win-rate" id="winRateSection" style="display: none">
          <h2>게임 승률</h2>
          <p>승리: <span id="wins">10</span></p>
          <p>패배: <span id="losses">5</span></p>
          <p>승률: <span id="winRate">66.67%</span></p>
          <button onclick="backToProfile()">뒤로 가기</button>
        </div>

        <div class="pokemon-list" id="pokemonListSection" style="display: none">
          <h2>포켓몬 수집 목록</h2>
          <ul id="pokemonCollection"></ul>
          <button onclick="backToProfile()">뒤로 가기</button>
        </div>
      </div>
    </main>
  </body>
</html>
